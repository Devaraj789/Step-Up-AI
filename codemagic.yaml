workflows:
android-workflow:
  name: Android Build
  max_build_duration: 60
  environment:
    node: v18.17.0
  scripts:
    - name: Install dependencies
      script: |
        cd artifacts/mobile && pnpm install
    - name: Build Android
      script: |
        cd artifacts/mobile && npx expo export --platform android
  artifacts:
    - artifacts/mobile/dist/**/*.apk