workflows:
android-workflow:
  name: Android Build
  max_build_duration: 60
  environment:
    node: 18.17.0
  scripts:
    - name: Install dependencies
      script: |
        cd artifacts/mobile
        npm install -g expo-cli
        pnpm install
    - name: Build Android APK
      script: |
        cd artifacts/mobile
        npx expo export --platform android
  artifacts:
    - artifacts/mobile/dist/**